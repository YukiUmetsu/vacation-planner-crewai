services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: vacation-planner-dynamodb
    ports:
      - "8000:8000"
    # -inMemory avoids SQLite volume permission failures on Docker Desktop.
    # Data resets when the container stops (fine for local API / smoke tests).
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    working_dir: /home/dynamodblocal

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    container_name: vacation-planner-dynamodb-admin
    depends_on:
      - dynamodb-local
    ports:
      - "8001:8001"
    environment:
      DYNAMO_ENDPOINT: http://dynamodb-local:8000
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
