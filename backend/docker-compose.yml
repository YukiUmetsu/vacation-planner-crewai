services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: vacation-planner-dynamodb
    ports:
      - "8000:8000"
    # Persist across container restarts (drop -inMemory; use sharedDb so one file works for all clients)
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /home/dynamodblocal/data"
    volumes:
      - dynamodb_data:/home/dynamodblocal/data
    working_dir: /home/dynamodblocal

volumes:
  dynamodb_data:
